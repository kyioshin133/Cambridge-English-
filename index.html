<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambridge - Credentials</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="credentials-container">
        <h2 class="section-title">Licenses & Certifications</h2>
        <p class="section-subtitle">Verified professional credentials and academic achievements.</p>
        
        <div class="credentials-grid">
            <!-- Certification Card -->
            <div class="credential-card">
                <div class="card-header">
                    <div class="institution-logo">
                        <!-- Placeholder for a standard professional icon or generic emblem -->
                        <span class="logo-icon">📜</span>
                    </div>
                    <div class="credential-info">
                        <h3>Certificate in Advanced English</h3>
                        <p class="issuer">Cambridge Assessment English</p>
                        <p class="issue-date">Issued: August 2021 · Does not expire</p>
                    </div>
                </div>
                
                <div class="card-body">
                    <p class="credential-id"><strong>Credential ID:</strong> A9712221</p>
                    <div class="badge-container">
                        <span class="badge">Level C1</span>
                        <span class="badge">Grade B</span>
                    </div>
                </div>
                
                <div class="card-footer">
                    <a href="https://www.cambridgeenglish-sand.vercel.app" target="_blank" rel="noopener noreferrer" class="verify-btn">
                        Verify Credential 
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
                    </a>
                </div>
            </div>
            
            <!-- You can easily duplicate the .credential-card div here for more certificates -->
        </div>
    </section>

</body>
</html>
